{% extends 'base.html' %}

{% block title %}Anonymous Complaint Submitted{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check-circle text-green-500 text-4xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Anonymous Complaint Submitted!</h1>
        <p class="text-gray-500 mb-4">Your tracking code is:</p>
        <div class="bg-gray-100 p-4 rounded-lg mb-6">
            <span class="text-3xl font-mono font-bold text-orange-500 tracking-wider">{{ complaint.tracking_code }}</span>
        </div>
        <p class="text-sm text-gray-500 mb-6">Save this code to track your complaint status anonymously.</p>
        <div class="flex flex-col gap-3">
            <a href="{% url 'track_anonymous' %}" class="bg-orange-500 text-white py-3 rounded-lg font-semibold text-center hover:bg-orange-600 transition">
                <i class="fas fa-search mr-2"></i>Track Complaint
            </a>
            <a href="{% url 'home' %}" class="border border-gray-300 text-gray-600 py-3 rounded-lg font-semibold text-center hover:bg-gray-50 transition">
                <i class="fas fa-home mr-2"></i>Return Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
