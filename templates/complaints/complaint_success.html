{% extends 'base.html' %}

{% block title %}Success - Barangay System{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check-circle text-green-500 text-4xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Complaint Submitted!</h1>
        <p class="text-gray-500 mb-4">Your tracking code is:</p>
        <div class="bg-gray-100 p-4 rounded-lg mb-6">
            <span class="text-3xl font-mono font-bold text-orange-500 tracking-wider">{{ complaint.tracking_code }}</span>
        </div>
        <p class="text-sm text-gray-500 mb-6">Save this code to track your complaint status.</p>
        <div class="flex flex-col sm:flex-row gap-4">
            <a href="{% url 'track_complaint' %}" class="flex-1 bg-orange-500 text-white py-3 rounded-lg font-semibold text-center hover:bg-orange-600 transition">
                <i class="fas fa-search mr-2"></i>Track Complaint
            </a>
            <a href="{% url 'submit_complaint' %}" class="flex-1 border border-orange-500 text-orange-500 py-3 rounded-lg font-semibold text-center hover:bg-orange-50 transition">
                <i class="fas fa-plus mr-2"></i>File Another
            </a>
        </div>
    </div>
</div>
{% endblock %}
