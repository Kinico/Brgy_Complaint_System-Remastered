{% extends 'base.html' %}

{% block title %}Register - Barangay Complaint System{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-orange-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user-plus text-white text-2xl"></i>
            </div>
            <h2 class="text-3xl font-display font-bold text-gray-800">Create Account</h2>
            <p class="text-gray-500 mt-2">Join Barangay 10</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 font-medium mb-2">First Name</label>
                    <input type="text" name="first_name" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                           placeholder="Enter first name">
                </div>
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Last Name</label>
                    <input type="text" name="last_name" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                           placeholder="Enter last name">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Email Address</label>
                <input type="email" name="email" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                       placeholder="your@email.com">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Password</label>
                <input type="password" name="password1" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                       placeholder="Enter password">
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 font-medium mb-2">Confirm Password</label>
                <input type="password" name="password2" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                       placeholder="Confirm password">
            </div>
            
            <button type="submit" class="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold hover:bg-orange-600 transition">
                Register
            </button>
        </form>
        
        <p class="text-center text-gray-500 mt-6">
            Already have an account? <a href="{% url 'login' %}" class="text-orange-500 hover:underline">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}
